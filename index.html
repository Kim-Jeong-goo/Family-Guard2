<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Guard 연결 점검</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      line-height: 1.6;
    }
    button {
      font-size: 18px;
      padding: 12px 18px;
      margin-top: 12px;
      margin-right: 8px;
      cursor: pointer;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f3f3f3;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <h1>연결 점검</h1>
  <p>아래 버튼을 누르면 GitHub Pages에서 Apps Script 웹앱으로 요청을 보냅니다.</p>

  <button onclick="testGet()">GET 점검</button>
  <button onclick="testPost()">POST 점검</button>

  <pre id="result">아직 실행 안 함</pre>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwSeGQ2cf41HxWrEPxfMY0GgSPJdNOH9PNTq5BqlcCp82JZCPZ4sdGD7I8zX-tbfJiv2A/exec";

    async function testGet() {
      const box = document.getElementById("result");
      box.textContent = "GET 요청 중...";
      try {
        const res = await fetch(APPS_SCRIPT_URL);
        const text = await res.text();
        box.textContent = "GET 성공\n\n" + text;
      } catch (e) {
        box.textContent = "GET 실패\n\n" + String(e);
      }
    }

    async function testPost() {
      const box = document.getElementById("result");
      box.textContent = "POST 요청 중...";
      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "get_quiz",
            payload: {}
          })
        });
        const text = await res.text();
        box.textContent = "POST 성공\n\n" + text;
      } catch (e) {
        box.textContent = "POST 실패\n\n" + String(e);
      }
    }
  </script>
</body>
</html>
